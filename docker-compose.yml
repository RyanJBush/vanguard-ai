services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vanguard
      POSTGRES_PASSWORD: vanguard
      POSTGRES_DB: vanguard_ai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://vanguard:vanguard@db:5432/vanguard_ai
      APP_ENV: development
      APP_DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
