services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: vanguard_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      VANGUARD_DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/vanguard_ai
      VANGUARD_JWT_SECRET: development-secret
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend

volumes:
  postgres_data:
